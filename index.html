<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f3ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
    }

    /* 파라미터 표시 */
    .params {
      background: #f6f8ff;
      border: 1px solid #dce3ff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }
    .params .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #eef0ff;
    }
    .params .row:last-child { border-bottom: none; }
    .params .key {
      font-size: 11px;
      color: #999;
      white-space: nowrap;
      padding-top: 1px;
      min-width: 72px;
    }
    .params .val {
      font-size: 12px;
      color: #4f6ef7;
      font-weight: 600;
      text-align: right;
      word-break: break-all;
    }

    /* 카운트다운 */
    .center { text-align: center; margin-bottom: 24px; }
    .label  { font-size: 13px; color: #888; margin-bottom: 6px; }
    .count  { font-size: 64px; font-weight: 800; color: #4f6ef7; line-height: 1; }

    /* 편집 영역 */
    .edit-area { display: none; margin-bottom: 20px; }
    .edit-area label {
      font-size: 11px;
      color: #999;
      display: block;
      margin: 10px 0 4px;
    }
    .edit-area input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .edit-area input:focus { border-color: #4f6ef7; }

    /* 버튼 */
    .btns { display: flex; flex-direction: column; gap: 10px; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: .85; transform: scale(.98); }
    .go1   { background: #4f6ef7; color: #fff; }
    .go2   { background: #34b36a; color: #fff; }
    .pause { background: #f0f0f0; color: #444; }
  </style>
</head>
<body>
<div class="box">

  <div class="params">
    <div class="row"><span class="key">aot_sub1</span><span class="val" id="disp1">-</span></div>
    <div class="row"><span class="key">aot_sub2</span><span class="val" id="disp2">-</span></div>
    <div class="row"><span class="key">aot_sub3</span><span class="val" id="disp3">-</span></div>
  </div>

  <div class="center">
    <div class="label">현재창으로 페이지 이동 중</div>
    <div class="count" id="count">3</div>
  </div>

  <div class="edit-area" id="editArea">
    <label>aot_sub1</label><input id="sub1">
    <label>aot_sub2</label><input id="sub2">
    <label>aot_sub3</label><input id="sub3">
  </div>

  <div class="btns">
    <button class="go1"   onclick="go(false)">바로이동 (현재 창)</button>
    <button class="go2"   onclick="go(true)">바로이동 (새 창)</button>
    <button class="pause" id="pauseBtn" onclick="togglePause()">일시정지</button>
  </div>

</div>

<script>
  const BASE = "https://ofw.adison.co/u/naverpay/ads/1023913?from=ad_list&aot_source=pincrux&aot_medium=a_pincrux_cps_r_2";

  function nowStr() {
    const d = new Date(), p = n => String(n).padStart(2,'0');
    return d.getFullYear() + p(d.getMonth()+1) + p(d.getDate())
      + '_' + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
  }

  document.getElementById("sub1").value = "pinkey_" + nowStr();
  document.getElementById("sub2").value = "pubkey_jason_test";
  document.getElementById("sub3").value = "pubkey_jason_test";

  function updateDisplay() {
    document.getElementById("disp1").textContent = document.getElementById("sub1").value || "-";
    document.getElementById("disp2").textContent = document.getElementById("sub2").value || "-";
    document.getElementById("disp3").textContent = document.getElementById("sub3").value || "-";
  }
  updateDisplay();
  ["sub1","sub2","sub3"].forEach(id =>
    document.getElementById(id).addEventListener("input", updateDisplay)
  );

  function buildURL() {
    const s1 = document.getElementById("sub1").value;
    const s2 = document.getElementById("sub2").value;
    const s3 = document.getElementById("sub3").value;
    return BASE
      + (s1 ? "&aot_sub1=" + encodeURIComponent(s1) : "")
      + (s2 ? "&aot_sub2=" + encodeURIComponent(s2) : "")
      + (s3 ? "&aot_sub3=" + encodeURIComponent(s3) : "");
  }

  function go(newTab) {
    const url = buildURL();
    if (newTab) window.open(url, '_blank');
    else location.href = url;
  }

  let count = 3, paused = false;
  const countEl = document.getElementById("count");

  const timer = setInterval(() => {
    if (paused) return;
    count--;
    countEl.textContent = count;
    if (count <= 0) { clearInterval(timer); go(false); }
  }, 1000);

  function togglePause() {
    paused = !paused;
    const btn = document.getElementById("pauseBtn");
    const edit = document.getElementById("editArea");
    if (paused) {
      btn.textContent = "재시작";
      edit.style.display = "block";
    } else {
      updateDisplay();
      btn.textContent = "일시정지";
      edit.style.display = "none";
    }
  }
</script>
</body>
</html>
